name: BaseballLiveKR
options:
  bundleIdPrefix: kr.suhohan
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 0.0.1
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: YES
targets:
  BaseballLiveKRiOS:
    type: application
    platform: iOS
    sources:
      - path: Packages/BaseballLiveKRCore/Sources/BaseballLiveKRCore
      - path: Packages/BaseballLiveKRDesignSystem/Sources/BaseballLiveKRDesignSystem
      - path: Packages/BaseballLiveKRFeatures/Sources/BaseballLiveKRFeatures
      - path: KboLiveApp/Shared
        excludes:
          - TeamWordmarks/**
          - TeamBrandAssets/**
      - path: KboLiveApp/iOS
    dependencies:
      - target: BaseballLiveKRWidgetExtension
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: KboLiveApp/iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: KboLiveApp/iOS/BaseballLiveKRiOS.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: kr.suhohan.baseballlivekr.ios
        PRODUCT_NAME: BaseballLiveKR
  BaseballLiveKRmacOS:
    type: application
    platform: macOS
    sources:
      - path: Packages/BaseballLiveKRCore/Sources/BaseballLiveKRCore
      - path: Packages/BaseballLiveKRDesignSystem/Sources/BaseballLiveKRDesignSystem
      - path: Packages/BaseballLiveKRFeatures/Sources/BaseballLiveKRFeatures
      - path: KboLiveApp/Shared
        excludes:
          - TeamWordmarks/**
          - TeamBrandAssets/**
      - path: KboLiveApp/macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.suhohan.baseballlivekr.macos
        PRODUCT_NAME: BaseballLiveKR
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: KboLiveApp/macOS/Info.plist
  BaseballLiveKRWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Packages/BaseballLiveKRCore/Sources/BaseballLiveKRCore
      - path: Packages/BaseballLiveKRDesignSystem/Sources/BaseballLiveKRDesignSystem
      - path: KboLiveApp/Shared/LiveGameActivityAttributes.swift
      - path: KboLiveApp/Shared/SampleGameFactory.swift
      - path: KboLiveApp/Shared/WidgetGameSnapshotStore.swift
      - path: KboLiveApp/Widget
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: KboLiveApp/Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: KboLiveApp/Widget/BaseballLiveKRWidget.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: kr.suhohan.baseballlivekr.ios.widget
        PRODUCT_NAME: BaseballLiveKRWidget
        SKIP_INSTALL: YES
schemes:
  BaseballLiveKRiOS:
    preActions:
      - name: Clean Before Run
        settingsTarget: BaseballLiveKRiOS
        script: |
          rm -rf "${BUILD_DIR}"
    build:
      targets:
        BaseballLiveKRiOS: all
        BaseballLiveKRWidgetExtension: all
    run:
      config: Debug
      executable: BaseballLiveKRiOS
  BaseballLiveKRmacOS:
    preActions:
      - name: Clean Before Run
        settingsTarget: BaseballLiveKRmacOS
        script: |
          rm -rf "${BUILD_DIR}"
    build:
      targets:
        BaseballLiveKRmacOS: all
    run:
      config: Debug
  BaseballLiveKRWidgetExtension:
    build:
      targets:
        BaseballLiveKRWidgetExtension: all
