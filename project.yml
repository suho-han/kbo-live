name: KboLiveApp
options:
  bundleIdPrefix: com.suhohan
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 0.0.1
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: YES
targets:
  KboLiveiOS:
    type: application
    platform: iOS
    sources:
      - path: Packages/KboLiveCore/Sources/KboLiveCore
      - path: Packages/KboLiveDesignSystem/Sources/KboLiveDesignSystem
      - path: Packages/KboLiveFeatures/Sources/KboLiveFeatures
      - path: KboLiveApp/Shared
        excludes:
          - TeamWordmarks/**
          - TeamBrandAssets/**
      - path: KboLiveApp/iOS
    dependencies:
      - target: KboLiveWidgetExtension
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: KboLiveApp/iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: KboLiveApp/iOS/KboLiveiOS.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.suhohan.kbo-live.ios
        PRODUCT_NAME: KboLiveiOS
  KboLivemacOS:
    type: application
    platform: macOS
    sources:
      - path: Packages/KboLiveCore/Sources/KboLiveCore
      - path: Packages/KboLiveDesignSystem/Sources/KboLiveDesignSystem
      - path: Packages/KboLiveFeatures/Sources/KboLiveFeatures
      - path: KboLiveApp/Shared
        excludes:
          - TeamWordmarks/**
          - TeamBrandAssets/**
      - path: KboLiveApp/macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: kr.suhohan.baseballlivekr.macos
        PRODUCT_NAME: BaseballLiveKR
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: KboLiveApp/macOS/Info.plist
  KboLiveWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Packages/KboLiveCore/Sources/KboLiveCore
      - path: Packages/KboLiveDesignSystem/Sources/KboLiveDesignSystem
      - path: KboLiveApp/Shared/LiveGameActivityAttributes.swift
      - path: KboLiveApp/Shared/SampleGameFactory.swift
      - path: KboLiveApp/Shared/WidgetGameSnapshotStore.swift
      - path: KboLiveApp/Widget
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: KboLiveApp/Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: KboLiveApp/Widget/KboLiveWidget.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.suhohan.kbo-live.ios.widget
        PRODUCT_NAME: KboLiveWidget
        SKIP_INSTALL: YES
schemes:
  KboLiveiOS:
    preActions:
      - name: Clean Before Run
        settingsTarget: KboLiveiOS
        script: |
          rm -rf "${BUILD_DIR}"
    build:
      targets:
        KboLiveiOS: all
        KboLiveWidgetExtension: all
    run:
      config: Debug
      executable: KboLiveiOS
  KboLivemacOS:
    preActions:
      - name: Clean Before Run
        settingsTarget: KboLivemacOS
        script: |
          rm -rf "${BUILD_DIR}"
    build:
      targets:
        KboLivemacOS: all
    run:
      config: Debug
  KboLiveWidgetExtension:
    build:
      targets:
        KboLiveWidgetExtension: all
